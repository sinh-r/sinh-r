  --border:rgba(255,255,255,0.06);
  --border-hover:rgba(255,255,255,0.12);

.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--theme-primary);animation:pdot 2.2s ease-in-out infinite}

.hero-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.022) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
.hero-glow{position:absolute;top:-180px;right:-60px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,var(--theme-glow),transparent 68%);pointer-events:none;transition:background .6s ease}
.hero-glow2{position:absolute;bottom:-100px;left:-100px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,var(--theme-glow),transparent 65%);pointer-events:none;opacity:.5;transition:background .6s ease}
.hero-inner{max-width:var(--max-w);margin:0 auto;width:100%;position:relative;z-index:1}

/* Class chip in hero */
.hero-class-chip{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--theme-glow);border:1px solid var(--theme-border);border-radius:12px;margin-bottom:28px;width:fit-content}
.hcc-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--text-muted)}
.hcc-name{font-family:var(--font-heading);font-size:14px;font-weight:700;color:var(--theme-primary);letter-spacing:-.01em}
.hcc-divider{width:1px;height:28px;background:var(--theme-border)}
.hcc-tags{display:flex;flex-direction:column;gap:3px}

function useInView(threshold = 0.12) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

function useTyping(phrases, speed = 72, pause = 2400) {
  const [text, setText] = useState('');
  const [idx, setIdx] = useState(0);
  const [ci, setCi] = useState(0);
  const [del, setDel] = useState(false);
  useEffect(() => { setText(''); setIdx(0); setCi(0); setDel(false); }, [phrases]);
  useEffect(() => {
    const cur = phrases[idx] || '';
    let t;
    if (!del) {
      if (ci < cur.length) t = setTimeout(() => { setText(cur.slice(0, ci + 1)); setCi(c => c + 1); }, speed);
      else t = setTimeout(() => setDel(true), pause);
    } else {
      if (ci > 0) t = setTimeout(() => { setText(cur.slice(0, ci - 1)); setCi(c => c - 1); }, speed / 2);
      else { setDel(false); setIdx(i => (i + 1) % phrases.length); }
    }
    return () => clearTimeout(t);
  }, [text, ci, del, idx, phrases]);
  return text;
}

const IconMail = () => (
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
    <rect x="2" y="4" width="20" height="16" rx="2"/>
    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
  </svg>
);
const IconPhone = () => (
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.36 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/>

// ─── FadeUp wrapper ───────────────────────────────────────────────────────────
function FU({ children, delay = 0 }) {
  const [ref, vis] = useInView();
  return <div ref={ref} className={`fu${vis ? ' vis' : ''}`} style={{ transitionDelay: `${delay}s` }}>{children}</div>;
}

// ─── Section Header ───────────────────────────────────────────────────────────
function SH({ tag, title }) {
  const [ref, vis] = useInView();
  return (
    <div ref={ref} className={`sec-header fu${vis ? ' vis' : ''}`}>
      <span className="sec-tag">{tag}</span>
      <h2 className="sec-title">{title}</h2>
      <div className="sec-line" />
    </div>
  );
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav() {
  return (
    <nav>
      <div className="nav-logo"><b>RS</b> / rishabh.dev</div>
      <ul className="nav-links">
        {['experience','skills','projects','awards','education','contact'].map(id => (
          <li key={id}><a href={`#${id}`}>{id.charAt(0).toUpperCase()+id.slice(1)}</a></li>
        ))}
      </ul>
      <div className="nav-class-chip">
        <span className="nav-dot" />
        Full Stack + AI Engineer
      </div>
    </nav>
  );
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
function Hero() {
  const tagline = useTyping(TAGLINES);
  return (
    <section id="hero">
      <div className="hero-grid" />
      <div className="hero-glow" />
      <div className="hero-glow2" />
      <div className="hero-inner">
        {/* Class chip */}
        <div className="hero-class-chip">
          <div>
            <div className="hcc-label">Developer Class</div>
            <div className="hcc-name">Full Stack + AI Engineer</div>
          </div>
          <div className="hcc-divider" />
          <div className="hcc-tags">
            <span className="hcc-tag">.NET · C# · Azure</span>
            <span className="hcc-tag">OpenAI · RAG · Cloud</span>
          </div>
        </div>
        {/* Badge */}
        <div className="hero-badge">
          <span className="nav-dot" />
          LVL 04 · SENIOR ENGINEER · INFOSYS
        </div>
        {/* Name */}
        <h1 className="hero-name">Rishabh Sinha</h1>
        {/* Typing tagline */}
        <p className="hero-tagline">{tagline}<span className="cursor" /></p>
        {/* Stats */}
        <div className="hero-stats">
          {DATA.stats.map((s, i) => (
            <div key={i} className="stat-chip">
              <div className="stat-v">{s.v}</div>
              <div className="stat-l">{s.l}</div>
            </div>
          ))}
        </div>
        {/* CTA */}
        <div className="hero-cta">
          <a href={`mailto:${DATA.email}`} className="btn-p"><IconMail /> Get in Touch</a>
          <a href={DATA.linkedin} target="_blank" rel="noopener" className="btn-s"><IconLinkedIn /> LinkedIn</a>
          <a href={DATA.github} target="_blank" rel="noopener" className="btn-s"><IconGitHub /> GitHub</a>
        </div>
      </div>
    </section>
  );
}

// ─── EXPERIENCE ───────────────────────────────────────────────────────────────
function Experience() {
  return (
    <section id="experience" className="sec">
      <div className="container">
        <SH tag="// 01" title="Experience" />
        <div className="timeline">
          {DATA.experience.map((job, i) => (
            <FU key={i} delay={i * 0.1}>
              <div className="tl-item">
                <div className={`tl-dot${job.current ? ' current' : ''}`} />
                <div className="tl-head">
                  <div>
                    <div className="tl-role">{job.role}</div>
                    <div className="tl-co">{job.co} · {job.loc}</div>
                  </div>
                  <div className="tl-right">
                    {job.current && <span className="tl-badge">● CURRENT</span>}
                    <span className="tl-period">{job.period}</span>
                  </div>
                </div>
                <ul className="tl-bullets">
                  {job.bullets.map((b, j) => <li key={j}>{b}</li>)}
                </ul>
              </div>
            </FU>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── SKILLS ──────────────────────────────────────────────────────────────────
function Skills() {
  return (
    <section id="skills" className="sec sec-alt">
      <div className="container">
        <SH tag="// 02" title="Tech Stack" />
        <div className="skills-grid">
          {Object.entries(DATA.skills).map(([cat, pills], i) => (
            <FU key={cat} delay={i * 0.07}>
              <div className="skill-cat">
                <div className="skill-cat-name">{cat}</div>
                <div className="skill-pills">
                  {pills.map(p => <span key={p} className="skill-pill">{p}</span>)}
                </div>
              </div>
            </FU>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── PROJECTS ─────────────────────────────────────────────────────────────────
function Projects() {
  return (
    <section id="projects" className="sec">
      <div className="container">
        <SH tag="// 03" title="Projects" />
        <div className="proj-grid">
          {DATA.projects.map((p, i) => (
            <FU key={i} delay={i * 0.12}>
              <div className="proj-card">
                <div className="proj-name">{p.name}</div>
                <div className="proj-tech">{p.tech}</div>
                <p className="proj-desc">{p.desc}</p>
              </div>
            </FU>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── AWARDS ──────────────────────────────────────────────────────────────────
function Awards() {
  return (
    <section id="awards" className="sec sec-alt">
      <div className="container">
        <SH tag="// 04" title="Achievements" />
        <div className="awards-grid">
          {DATA.awards.map((a, i) => (
            <FU key={i} delay={i * 0.1}>
              <div className="award-card">
                <span className="award-icon">{a.icon}</span>
                <div className="award-name">{a.name}</div>
                <div className="award-org">{a.org}</div>
                <div className="award-date">{a.date}</div>
                <p className="award-desc">{a.desc}</p>
              </div>
            </FU>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── EDUCATION ───────────────────────────────────────────────────────────────
function Education() {
  const e = DATA.edu;
  return (
    <section id="education" className="sec">
      <div className="container">
        <SH tag="// 05" title="Education" />
        <div className="edu-grid">
          <FU>
            <div className="edu-card">
              <div className="edu-deg">{e.deg}</div>
              <div className="edu-school">{e.inst} · {e.loc}</div>
              <div className="edu-meta">{e.year} · GPA: {e.gpa} · {e.note}</div>
            </div>
          </FU>
          {DATA.certs.map((c, i) => (
            <FU key={i} delay={(i + 1) * 0.1}>
              <div className="edu-card">
                <div className="edu-deg" style={{fontSize:'15px'}}>{c.name}</div>
                <div className="edu-meta">{c.date}</div>
              </div>
            </FU>
          ))}
        </div>
        <FU delay={0.3}>
          <div style={{marginTop:'32px'}}>
            <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:'10.5px',color:'var(--theme-primary)',textTransform:'uppercase',letterSpacing:'.18em',marginBottom:'12px'}}>Languages</div>
            <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
              {DATA.langs.map(l => (
                <span key={l} style={{padding:'6px 15px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',color:'var(--text-secondary)',fontFamily:'Inter,sans-serif'}}>{l}</span>
              ))}
            </div>
          </div>
        </FU>
      </div>
    </section>
  );
}

// ─── CONTACT ─────────────────────────────────────────────────────────────────
function Contact() {
  return (
    <section id="contact" className="sec" style={{borderTop:'1px solid var(--border)'}}>
      <div className="container">
        <FU>
          <p style={{fontFamily:'JetBrains Mono,monospace',fontSize:'11px',color:'var(--theme-primary)',letterSpacing:'.1em',marginBottom:'12px'}}>// 06 CONTACT</p>
          <h2 style={{fontFamily:'Space Grotesk,sans-serif',fontSize:'clamp(28px,4vw,40px)',fontWeight:700,letterSpacing:'-.025em',marginBottom:'14px'}}>Let's build something.</h2>
          <p style={{fontSize:'15px',color:'var(--text-secondary)',maxWidth:'440px',textWrap:'pretty',marginBottom:'0'}}>Open to senior engineering roles, AI/cloud projects, and technical collaborations.</p>
        </FU>
        <FU delay={0.1}>
          <div className="hero-cta" style={{marginTop:'32px'}}>
            <a href={`mailto:${DATA.email}`} className="btn-p"><IconMail /> Get in Touch</a>
            <a href={DATA.linkedin} target="_blank" rel="noopener" className="btn-s"><IconLinkedIn /> LinkedIn</a>
            <a href={DATA.github} target="_blank" rel="noopener" className="btn-s"><IconGitHub /> GitHub</a>
          </div>
        </FU>
        <div className="footer-bar">
          <span>© 2026 Rishabh Sinha</span>
          <span style={{color:'var(--text-muted)'}}>Senior Software Engineer · Ghaziabad, India</span>
        </div>
      </div>
    </section>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  return (
    <>
      <Nav />
      <Hero />
      <Experience />
      <Skills />
      <Projects />
      <Awards />
      <Education />
      <Contact />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
